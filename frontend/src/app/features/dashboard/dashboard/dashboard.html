<div class="dashboard-shell">

  <!-- ── Sidebar ───────────────────────────────────────────── -->
  <app-sidebar></app-sidebar>

  <!-- ── Main Area ─────────────────────────────────────────── -->
  <div class="main-area" [class.expanded]="sidebarCollapsed">

    <!-- Top Header Bar -->
    <header class="topbar">

      <div class="topbar-left">
        <!-- Breadcrumb / Page Title -->
        <div class="page-breadcrumb">
          <span class="breadcrumb-app">JobAI</span>
          <svg class="breadcrumb-sep" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 18 15 12 9 6"/>
          </svg>
          <span class="breadcrumb-page">{{ currentPageLabel }}</span>
        </div>
      </div>

      <div class="topbar-right">

        <!-- Search Bar -->
        <div class="topbar-search">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <circle cx="11" cy="11" r="8"/>
            <line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" placeholder="Search jobs, companies…" [(ngModel)]="searchQuery" (keyup.enter)="onSearch()"/>
        </div>

        <!-- Notifications -->
        <button class="topbar-icon-btn" title="Notifications" (click)="toggleNotifications()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8">
            <path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/>
            <path d="M13.73 21a2 2 0 01-3.46 0"/>
          </svg>
          @if (notifCount > 0) {
            <span class="notif-dot">{{ notifCount }}</span>
          }
        </button>

        <!-- User Avatar Menu -->
        <button class="topbar-avatar" title="Account" (click)="toggleUserMenu()">
          <div class="avatar-circle">{{ userInitials }}</div>
          <div class="avatar-info">
            <span class="avatar-name">{{ userName }}</span>
            <span class="avatar-role">Job Seeker</span>
          </div>
          <svg class="avatar-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="6 9 12 15 18 9"/>
          </svg>
        </button>

        <!-- User Dropdown -->
        @if (userMenuOpen) {
          <div class="user-dropdown">
            <div class="dropdown-header">
              <div class="dh-avatar">{{ userInitials }}</div>
              <div>
                <p class="dh-name">{{ userName }}</p>
                <p class="dh-role">Job Seeker</p>
              </div>
            </div>
            <hr class="dropdown-divider"/>
            <button class="dropdown-item" (click)="navigate('/dashboard/profile')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/></svg>
              My Profile
            </button>
            <button class="dropdown-item" (click)="navigate('/dashboard/settings')">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z M15 12a3 3 0 11-6 0 3 3 0 016 0z"/></svg>
              Settings
            </button>
            <hr class="dropdown-divider"/>
            <button class="dropdown-item danger" (click)="logout()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8"><path d="M17 16l4-4m0 0l-4-4m4 4H7m6 4v1a3 3 0 01-3 3H6a3 3 0 01-3-3V7a3 3 0 013-3h4a3 3 0 013 3v1"/></svg>
              Sign Out
            </button>
          </div>
        }

      </div>
    </header>

    <!-- Page Content -->
    <main class="page-content">
      <router-outlet></router-outlet>
    </main>

  </div>

</div>
